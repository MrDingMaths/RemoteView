<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a73e8"/>

  <!-- Phone body -->
  <rect x="7" y="11" width="24" height="42" rx="4" ry="4" fill="white"/>
  <!-- Earpiece -->
  <rect x="14" y="15" width="10" height="2.5" rx="1.25" fill="#1a73e8"/>
  <!-- Home button -->
  <circle cx="19" cy="48" r="2.5" fill="#1a73e8"/>

  <!-- Signal waves radiating right from phone -->
  <!-- Small arc -->
  <path d="M 33 26 A 6 6 0 0 1 39 32 A 6 6 0 0 1 33 38" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="1"/>
  <!-- Medium arc -->
  <path d="M 33 20 A 12 12 0 0 1 45 32 A 12 12 0 0 1 33 44" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Large arc -->
  <path d="M 33 14 A 18 18 0 0 1 51 32 A 18 18 0 0 1 33 50" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
